<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機能性表示食品 届出データビューワー</title>
<style>
:root {
  --bg:#f7f6f2;--surface:#fff;--surface2:#f3f0ec;
  --border:#d4d1ca;--div:#e8e5e0;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --pri:#01696f;--pri-h:#0c4e54;--pri-l:#dff0f0;
  --ok-bg:#e8f5e0;--ok:#437a22;
  --err-bg:#fce8f4;--err:#a12c7b;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
  --sh1:0 1px 3px rgba(0,0,0,.07);
  --sh2:0 4px 16px rgba(0,0,0,.09);
  --sh3:0 12px 40px rgba(0,0,0,.14);
  --font:'Hiragino Sans','Meiryo','Yu Gothic UI',sans-serif;
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1e1c1a;--surface2:#252320;
  --border:#3a3836;--div:#2c2a28;
  --text:#cdccca;--muted:#797876;--faint:#5a5957;
  --pri:#4f98a3;--pri-h:#3a828c;--pri-l:#1a3434;
  --ok-bg:#1a2c10;--ok:#6daa45;
  --err-bg:#2a1020;--err:#d163a7;
  --sh1:0 1px 3px rgba(0,0,0,.2);
  --sh2:0 4px 16px rgba(0,0,0,.3);
  --sh3:0 12px 40px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
/* ヘッダー */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:0;z-index:100;box-shadow:var(--sh1)}
.hdr-in{max-width:1640px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;color:var(--pri);white-space:nowrap}
.meta{font-size:11px;color:var(--muted)}
.tbtn{margin-left:auto;background:none;border:1px solid var(--border);border-radius:var(--r8);padding:5px 10px;color:var(--muted);transition:all .15s;font-size:16px;line-height:1}
.tbtn:hover{background:var(--surface2);color:var(--text)}
/* シートタブ */
.sheet-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;align-items:flex-end}
.sheet-tabs-in{max-width:1640px;margin:0 auto;display:flex;gap:0;align-items:flex-end;width:100%}
.stab{padding:8px 20px 7px;border:1px solid transparent;border-bottom:none;border-radius:var(--r4) var(--r4) 0 0;font-size:13px;font-weight:600;color:var(--muted);background:var(--surface2);cursor:pointer;transition:all .15s;position:relative;bottom:-1px;margin-right:3px;white-space:nowrap}
.stab:hover{background:var(--pri-l);color:var(--pri)}
.stab.active{background:var(--surface);border-color:var(--border);border-bottom-color:var(--surface);color:var(--pri);box-shadow:0 -2px 0 var(--pri) inset}
.stab-icon{margin-right:5px;font-size:12px}
/* 検索バー */
.bar{max-width:1640px;margin:14px auto 0;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sw{position:relative;flex:1;min-width:180px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;width:15px;height:15px}
.si{width:100%;padding:8px 10px 8px 34px;border:1px solid var(--border);border-radius:var(--r8);background:var(--surface);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s,box-shadow .15s}
.si:focus{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l)}
.fs{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r8);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--font);outline:none;cursor:pointer;min-width:130px;transition:border-color .15s}
.fs:focus{border-color:var(--pri)}
.sb{font-size:12px;color:var(--muted);background:var(--surface2);padding:6px 10px;border-radius:var(--r8);white-space:nowrap}
.sb strong{color:var(--pri);font-size:14px}
.clr-btn{padding:6px 12px;border:1px solid var(--border);border-radius:var(--r8);background:var(--surface);color:var(--muted);font-size:12px;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap;display:none}
.clr-btn.vis{display:inline-flex;align-items:center;gap:4px}
.clr-btn:hover{background:var(--err-bg);border-color:var(--err);color:var(--err)}
/* テーブルエリア */
.tw{max-width:1640px;margin:12px auto 24px;padding:0 20px}
.tb{background:var(--surface);border-radius:var(--r12);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh1)}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--surface2);padding:0;text-align:left;font-weight:600;font-size:11px;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border);user-select:none;position:relative}
thead th .th-in{display:flex;align-items:center;gap:2px;padding:9px 12px;cursor:pointer;transition:background .1s}
thead th .th-in:hover{background:var(--pri-l);color:var(--pri)}
thead th.sorted .th-in{color:var(--pri)}
thead th.col-filtered .th-in{color:var(--pri)}
thead th.col-filtered .th-in::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--pri);margin-left:2px}
.flt-btn{flex-shrink:0;background:none;border:none;padding:2px 4px;border-radius:var(--r4);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .1s;font-size:10px;line-height:1;margin-left:auto}
.flt-btn:hover{background:var(--pri-l);color:var(--pri)}
.flt-btn.active{color:var(--pri);font-weight:bold}
tbody tr{border-bottom:1px solid var(--div);cursor:pointer;transition:background .08s}
tbody tr:hover{background:var(--pri-l)}
tbody tr:last-child{border-bottom:none}
td{padding:8px 12px;vertical-align:top}
.tc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;display:block}
.tn{text-align:center;font-family:monospace;font-weight:700;color:var(--pri);white-space:nowrap}
.td{white-space:nowrap;font-size:12px;color:var(--muted)}
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.bon{background:var(--ok-bg);color:var(--ok)}
.boff{background:var(--surface2);color:var(--muted)}
.bcancel{background:var(--err-bg);color:var(--err)}
.pag{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--div);flex-wrap:wrap;gap:6px}
.pbtns{display:flex;gap:3px;flex-wrap:wrap}
.pb{padding:4px 9px;border:1px solid var(--border);border-radius:var(--r4);background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;transition:all .1s;font-family:var(--font)}
.pb:hover{background:var(--pri-l);border-color:var(--pri);color:var(--pri)}
.pb.act{background:var(--pri);border-color:var(--pri);color:#fff}
.pb:disabled{opacity:.4;cursor:default;pointer-events:none}
.ppw{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.pps{padding:4px 6px;border:1px solid var(--border);border-radius:var(--r4);background:var(--surface);color:var(--text);font-size:12px;font-family:var(--font)}
/* 列フィルターポップアップ */
.col-flt-pop{display:none;position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);box-shadow:var(--sh3);width:300px;max-height:520px;overflow:hidden;flex-direction:column;animation:popin .15s cubic-bezier(.16,1,.3,1)}
.col-flt-pop.open{display:flex}
@keyframes popin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.cfp-hdr{padding:12px 14px 8px;border-bottom:1px solid var(--div)}
.cfp-hdr h3{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px}
.cfp-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r8);overflow:hidden}
.cfp-tab{flex:1;padding:5px 8px;background:var(--surface);border:none;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .1s;font-family:var(--font)}
.cfp-tab.active{background:var(--pri);color:#fff}
.cfp-body{overflow-y:auto;flex:1}
.cfp-text{padding:12px 14px}
.cfp-row{margin-bottom:10px}
.cfp-row label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.cfp-row select,.cfp-row input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r4);background:var(--surface);color:var(--text);font-size:12px;font-family:var(--font);outline:none;transition:border-color .15s}
.cfp-row select:focus,.cfp-row input:focus{border-color:var(--pri)}
.cfp-logic{display:flex;gap:6px;align-items:center;margin:8px 0}
.cfp-logic span{font-size:11px;color:var(--muted)}
.cfp-logic-btn{flex:1;padding:4px;border:1px solid var(--border);border-radius:var(--r4);background:var(--surface);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .1s;font-family:var(--font)}
.cfp-logic-btn.active{background:var(--pri-l);border-color:var(--pri);color:var(--pri)}
.cfp-list{padding:10px 14px}
.cfp-list-search{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r4);background:var(--surface);color:var(--text);font-size:12px;font-family:var(--font);outline:none;margin-bottom:8px;transition:border-color .15s}
.cfp-list-search:focus{border-color:var(--pri)}
.cfp-list-ctrl{display:flex;gap:6px;margin-bottom:6px}
.cfp-list-ctrl button{font-size:11px;color:var(--pri);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;font-family:var(--font)}
.cfp-vals{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r4)}
.cfp-val-item{display:flex;align-items:center;gap:7px;padding:5px 8px;cursor:pointer;transition:background .08s;font-size:12px}
.cfp-val-item:hover{background:var(--surface2)}
.cfp-val-item input[type=checkbox]{accent-color:var(--pri);cursor:pointer;flex-shrink:0}
.cfp-val-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cfp-ftr{padding:10px 14px;border-top:1px solid var(--div);display:flex;gap:6px;justify-content:flex-end}
.cfp-ftr button{padding:6px 14px;border-radius:var(--r8);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);border:1px solid transparent}
.cfp-ok{background:var(--pri);color:#fff;border-color:var(--pri)}
.cfp-ok:hover{background:var(--pri-h)}
.cfp-cl{background:none;border-color:var(--border);color:var(--muted)}
.cfp-cl:hover{background:var(--surface2);color:var(--text)}
.cfp-rst{background:none;border-color:var(--err);color:var(--err);margin-right:auto}
.cfp-rst:hover{background:var(--err-bg)}
/* SR情報テーブル（モーダル内） */
.sr-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.sr-table th{background:var(--surface2);padding:6px 8px;text-align:left;font-weight:600;font-size:10px;color:var(--muted);border:1px solid var(--border);white-space:nowrap}
.sr-table td{padding:6px 8px;border:1px solid var(--border);vertical-align:top;word-break:break-all;line-height:1.5}
.sr-table tr:nth-child(even) td{background:var(--surface2)}
.sr-count{font-size:11px;color:var(--muted);margin-bottom:6px}
/* モーダル */
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);align-items:center;justify-content:center;padding:16px;animation:fi .15s ease}
.ov.act{display:flex}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--r16);border:1px solid var(--border);max-width:880px;width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh3);animation:su .18s cubic-bezier(.16,1,.3,1)}
@keyframes su{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.mh{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px 14px;border-bottom:1px solid var(--border);gap:12px}
.mt{font-size:18px;font-weight:700;line-height:1.3}
.ms{font-size:12px;color:var(--muted);margin-top:4px}
.mc{flex-shrink:0;background:none;border:1px solid var(--border);border-radius:var(--r4);padding:3px 9px;cursor:pointer;color:var(--muted);font-size:18px;line-height:1.4;transition:all .1s}
.mc:hover{background:var(--surface2);color:var(--text)}
.mb{overflow-y:auto;padding:18px 24px;flex:1}
.msec{margin-bottom:18px}
.mst{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--pri);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--pri-l)}
.mg{display:grid;grid-template-columns:190px 1fr;gap:1px;background:var(--div);border-radius:var(--r4);overflow:hidden}
.mk{background:var(--surface2);padding:8px 10px;font-size:11px;font-weight:600;color:var(--muted)}
.mv{background:var(--surface);padding:8px 10px;font-size:13px;word-break:break-all;line-height:1.55}
.mv a{color:var(--pri);text-decoration:none}
.mv a:hover{text-decoration:underline}
.mf{padding:10px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.btn{padding:8px 18px;border-radius:var(--r8);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);border:1px solid transparent}
.btn-g{background:none;border-color:var(--border);color:var(--muted)}
.btn-g:hover{background:var(--surface2);color:var(--text)}
.empty,.loading{text-align:center;padding:56px 20px;color:var(--muted)}
.ei{font-size:36px;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:22px;height:22px;border:2px solid var(--div);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@media(max-width:600px){.mg{grid-template-columns:1fr}.mk{padding-bottom:2px}}
</style>
</head>
<body>
<header class="hdr">
<div class="hdr-in">
  <div class="logo">
    <svg viewBox="0 0 28 28" width="28" height="28" fill="none"><rect width="28" height="28" rx="7" fill="#01696f"/><rect x="6" y="8" width="10" height="2" rx="1" fill="white"/><rect x="6" y="12" width="16" height="2" rx="1" fill="white"/><rect x="6" y="16" width="13" height="2" rx="1" fill="white"/><circle cx="21" cy="9" r="4" fill="#4f98a3"/><path d="M19.5 9l1 1 2-2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    機能性表示食品 届出データビューワー
  </div>
  <div class="meta">ソース: {{SOURCE_FILE}} | 生成: {{UPDATE_TIME}}</div>
  <button class="tbtn" id="themeBtn" aria-label="テーマ切替">🌙</button>
</div>
</header>

<!-- シートタブ -->
<div class="sheet-tabs">
  <div class="sheet-tabs-in">
    <button class="stab active" id="tabMain" onclick="switchSheet('main')">
      <span class="stab-icon">📋</span>統合データ
    </button>
    <button class="stab" id="tabSR" onclick="switchSheet('sr')" style="display:none">
      <span class="stab-icon">📄</span>SR情報抽出
    </button>
  </div>
</div>

<!-- 統合データ用バー -->
<div class="bar" id="barMain">
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="si" type="search" id="srch" placeholder="商品名・法人名・成分名・届出番号で検索…" autocomplete="off">
  </div>
  <select class="fs" id="kFlt"><option value="">すべての食品区分</option>{{KUBUN_OPTIONS}}</select>
  <select class="fs" id="sFlt"><option value="">すべての販売状況</option>{{STATUS_OPTIONS}}</select>
  <button class="clr-btn" id="clrColFlt" title="列フィルターをすべてクリア">✕ 列フィルターをクリア</button>
  <div class="sb" id="cnt"><span class="spin"></span></div>
</div>

<!-- SR情報抽出用バー -->
<div class="bar" id="barSR" style="display:none">
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="si" type="search" id="srSrch" placeholder="届出番号・成分名・機能性などで検索…" autocomplete="off">
  </div>
  <button class="clr-btn" id="clrSRColFlt" title="列フィルターをすべてクリア">✕ 列フィルターをクリア</button>
  <div class="sb" id="srCnt"></div>
</div>

<!-- 統合データ テーブル -->
<div class="tw" id="twMain">
  <div class="tb">
    <div class="ts">
      <table>
        <thead id="tH"></thead>
        <tbody id="tB"><tr><td colspan="99" class="loading"><span class="spin"></span>読み込み中…</td></tr></tbody>
      </table>
    </div>
    <div class="pag" id="pag"></div>
  </div>
</div>

<!-- SR情報抽出 テーブル -->
<div class="tw" id="twSR" style="display:none">
  <div class="tb">
    <div class="ts">
      <table>
        <thead id="srTH"></thead>
        <tbody id="srTB"><tr><td colspan="99" class="loading"><span class="spin"></span>読み込み中…</td></tr></tbody>
      </table>
    </div>
    <div class="pag" id="srPag"></div>
  </div>
</div>

<!-- 列フィルターポップアップ (共有) -->
<div class="col-flt-pop" id="colFltPop">
  <div class="cfp-hdr">
    <h3 id="cfpTitle">列フィルター</h3>
    <div class="cfp-tabs">
      <button class="cfp-tab active" id="cfpTabText" onclick="switchCfpTab('text')">テキストフィルター</button>
      <button class="cfp-tab" id="cfpTabList" onclick="switchCfpTab('list')">値で絞り込み</button>
    </div>
  </div>
  <div class="cfp-body" id="cfpBody">
    <div id="cfpTextPane" class="cfp-text">
      <div class="cfp-row">
        <label>条件1</label>
        <select id="cfpOp1">
          <option value="contains">次の値を含む</option>
          <option value="notcontains">次の値を含まない</option>
          <option value="equals">次の値と等しい</option>
          <option value="notequals">次の値と等しくない</option>
          <option value="startswith">次の値で始まる</option>
          <option value="endswith">次の値で終わる</option>
          <option value="blank">空白</option>
          <option value="notblank">空白でない</option>
        </select>
        <input type="text" id="cfpVal1" placeholder="値を入力" style="margin-top:5px">
      </div>
      <div class="cfp-logic">
        <button class="cfp-logic-btn active" id="cfpAnd" onclick="setLogic('AND')">AND（かつ）</button>
        <button class="cfp-logic-btn" id="cfpOr" onclick="setLogic('OR')">OR（または）</button>
      </div>
      <div class="cfp-row">
        <label>条件2（任意）</label>
        <select id="cfpOp2">
          <option value="">（条件なし）</option>
          <option value="contains">次の値を含む</option>
          <option value="notcontains">次の値を含まない</option>
          <option value="equals">次の値と等しい</option>
          <option value="notequals">次の値と等しくない</option>
          <option value="startswith">次の値で始まる</option>
          <option value="endswith">次の値で終わる</option>
          <option value="blank">空白</option>
          <option value="notblank">空白でない</option>
        </select>
        <input type="text" id="cfpVal2" placeholder="値を入力（任意）" style="margin-top:5px">
      </div>
    </div>
    <div id="cfpListPane" class="cfp-list" style="display:none">
      <input class="cfp-list-search" type="text" id="cfpListSrch" placeholder="値を検索…">
      <div class="cfp-list-ctrl">
        <button onclick="selectAllVals(true)">すべて選択</button>
        <button onclick="selectAllVals(false)">すべて解除</button>
      </div>
      <div class="cfp-vals" id="cfpVals"></div>
    </div>
  </div>
  <div class="cfp-ftr">
    <button class="cfp-ftr-btn cfp-rst" onclick="resetColFlt()">リセット</button>
    <button class="cfp-ftr-btn cfp-cl" onclick="closeCfp()">キャンセル</button>
    <button class="cfp-ftr-btn cfp-ok" onclick="applyColFlt()">適用</button>
  </div>
</div>

<!-- 詳細モーダル (統合データ行クリック時) -->
<div class="ov" id="ov" role="dialog" aria-modal="true" aria-labelledby="mT">
  <div class="modal">
    <div class="mh">
      <div><div class="mt" id="mT"></div><div class="ms" id="mS"></div></div>
      <button class="mc" id="mC" aria-label="閉じる">✕</button>
    </div>
    <div class="mb" id="mB"></div>
    <div class="mf"><button class="btn btn-g" id="mCB">閉じる</button></div>
  </div>
</div>

<script>
// ========== データ ==========
const D={{ALL_DATA_JSON}};
const TC={{TABLE_COLS_JSON}};
const SR_D={{SR_RECORDS_JSON}};
const SR_TC={{SR_COLS_JSON}};
const KC="{{KUBUN_LABEL}}";
const SC="{{STATUS_LABEL}}";
const HAS_SR={{HAS_SR}};

// ========== 状態 ==========
let curSheet='main';
// 統合データ
let fil=D.slice(),pg=1,pp=50,sc=null,sa=true;
const colFilters={};
// SR情報
let srFil=SR_D.slice(),srPg=1,srPp=50,srSc=null,srSa=true;
const srColFilters={};
// 共有
let cfpCol=null,cfpTab='text',cfpLogic='AND',cfpForSheet='main';

// ========== テーマ ==========
(function(){
  const btn=document.getElementById('themeBtn'),h=document.documentElement;
  let t;
  try{t=localStorage.getItem('kvt');}catch(e){t=null;}
  if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  h.setAttribute('data-theme',t);btn.textContent=t==='dark'?'☀️':'🌙';
  btn.onclick=()=>{t=t==='dark'?'light':'dark';h.setAttribute('data-theme',t);try{localStorage.setItem('kvt',t);}catch(e){}btn.textContent=t==='dark'?'☀️':'🌙';};
})();

// ========== シート切替 ==========
function switchSheet(sheet){
  curSheet=sheet;
  document.getElementById('tabMain').classList.toggle('active',sheet==='main');
  document.getElementById('tabSR').classList.toggle('active',sheet==='sr');
  document.getElementById('barMain').style.display=sheet==='main'?'':'none';
  document.getElementById('barSR').style.display=sheet==='sr'?'':'none';
  document.getElementById('twMain').style.display=sheet==='main'?'':'none';
  document.getElementById('twSR').style.display=sheet==='sr'?'':'none';
}

// ========== 統合データ ヘッダー構築 ==========
function buildH(){
  const tr=document.createElement('tr');
  TC.forEach((c,i)=>{
    const th=document.createElement('th');
    const inner=document.createElement('div');
    inner.className='th-in';
    inner.innerHTML=c+' <span id="si'+i+'" style="opacity:.4;flex-shrink:0">↕</span>';
    inner.onclick=(e)=>{if(e.target.classList.contains('flt-btn'))return;srtBy(c,i);};
    const fb=document.createElement('button');
    fb.className='flt-btn';fb.title='列フィルター: '+c;fb.innerHTML='▼';
    fb.setAttribute('data-col',c);fb.setAttribute('data-sheet','main');
    fb.onclick=(e)=>{e.stopPropagation();openCfp(c,fb,'main');};
    inner.appendChild(fb);th.appendChild(inner);th.id='mth-'+i;
    tr.appendChild(th);
  });
  document.getElementById('tH').appendChild(tr);
}

// ========== SR情報 ヘッダー構築 ==========
function buildSRH(){
  const tr=document.createElement('tr');
  SR_TC.forEach((c,i)=>{
    const th=document.createElement('th');
    const inner=document.createElement('div');
    inner.className='th-in';
    inner.innerHTML=c+' <span id="srsi'+i+'" style="opacity:.4;flex-shrink:0">↕</span>';
    inner.onclick=(e)=>{if(e.target.classList.contains('flt-btn'))return;srSrtBy(c,i);};
    const fb=document.createElement('button');
    fb.className='flt-btn';fb.title='列フィルター: '+c;fb.innerHTML='▼';
    fb.setAttribute('data-col',c);fb.setAttribute('data-sheet','sr');
    fb.onclick=(e)=>{e.stopPropagation();openCfp(c,fb,'sr');};
    inner.appendChild(fb);th.appendChild(inner);th.id='srth-'+i;
    tr.appendChild(th);
  });
  document.getElementById('srTH').appendChild(tr);
}

// ========== 統合データ ソート ==========
function srtBy(c,i){
  if(sc===c)sa=!sa;else{sc=c;sa=true;}
  fil.sort((a,b)=>{const va=a.t[c]||'',vb=b.t[c]||'';return sa?va.localeCompare(vb,'ja'):vb.localeCompare(va,'ja');});
  document.querySelectorAll('#tH th').forEach((th,j)=>{
    th.classList.toggle('sorted',TC[j]===c);
    document.getElementById('si'+j).textContent=TC[j]===c?(sa?'↑':'↓'):'↕';
    document.getElementById('si'+j).style.opacity=TC[j]===c?'1':'.4';
  });
  pg=1;render();
}

// ========== SR情報 ソート ==========
function srSrtBy(c,i){
  if(srSc===c)srSa=!srSa;else{srSc=c;srSa=true;}
  srFil.sort((a,b)=>{const va=a.t[c]||'',vb=b.t[c]||'';return srSa?va.localeCompare(vb,'ja'):vb.localeCompare(va,'ja');});
  document.querySelectorAll('#srTH th').forEach((th,j)=>{
    th.classList.toggle('sorted',SR_TC[j]===c);
    document.getElementById('srsi'+j).textContent=SR_TC[j]===c?(srSa?'↑':'↓'):'↕';
    document.getElementById('srsi'+j).style.opacity=SR_TC[j]===c?'1':'.4';
  });
  srPg=1;srRender();
}

// ========== 列フィルターポップアップ ==========
function openCfp(col,anchorEl,sheet){
  cfpCol=col;cfpForSheet=sheet;
  const filters=sheet==='sr'?srColFilters:colFilters;
  const srcData=sheet==='sr'?SR_D:D;
  document.getElementById('cfpTitle').textContent='「'+col+'」フィルター';
  const cf=filters[col];
  if(cf){
    if(cf.type==='list'){switchCfpTab('list');}
    else{
      switchCfpTab('text');
      document.getElementById('cfpOp1').value=cf.op1||'contains';
      document.getElementById('cfpVal1').value=cf.val1||'';
      document.getElementById('cfpOp2').value=cf.op2||'';
      document.getElementById('cfpVal2').value=cf.val2||'';
      setLogic(cf.logic||'AND');
    }
  } else {
    switchCfpTab('text');
    document.getElementById('cfpOp1').value='contains';
    document.getElementById('cfpVal1').value='';
    document.getElementById('cfpOp2').value='';
    document.getElementById('cfpVal2').value='';
    setLogic('AND');
  }
  buildValList(col,srcData,filters[col]);
  const pop=document.getElementById('colFltPop');
  pop.classList.add('open');
  const rect=anchorEl.getBoundingClientRect();
  let left=rect.left,top=rect.bottom+4;
  if(left+310>window.innerWidth)left=window.innerWidth-314;
  if(top+540>window.innerHeight)top=rect.top-544;
  pop.style.left=Math.max(4,left)+'px';
  pop.style.top=Math.max(4,top)+'px';
}
function closeCfp(){document.getElementById('colFltPop').classList.remove('open');cfpCol=null;}
function switchCfpTab(tab){
  cfpTab=tab;
  document.getElementById('cfpTabText').classList.toggle('active',tab==='text');
  document.getElementById('cfpTabList').classList.toggle('active',tab==='list');
  document.getElementById('cfpTextPane').style.display=tab==='text'?'block':'none';
  document.getElementById('cfpListPane').style.display=tab==='list'?'block':'none';
}
function setLogic(l){
  cfpLogic=l;
  document.getElementById('cfpAnd').classList.toggle('active',l==='AND');
  document.getElementById('cfpOr').classList.toggle('active',l==='OR');
}
function buildValList(col,srcData,cf){
  const srch=document.getElementById('cfpListSrch');
  srch.value='';
  const selected=cf&&cf.type==='list'?cf.selected:null;
  const vals=[...new Set(srcData.map(r=>r.t[col]||''))].sort((a,b)=>a.localeCompare(b,'ja'));
  renderValList(vals,selected);
  srch.oninput=()=>{
    const q=srch.value.toLowerCase();
    renderValList(vals.filter(v=>v.toLowerCase().includes(q)),selected);
  };
}
function renderValList(vals,selected){
  const container=document.getElementById('cfpVals');
  container.innerHTML='';
  vals.forEach(v=>{
    const item=document.createElement('label');
    item.className='cfp-val-item';
    const cb=document.createElement('input');
    cb.type='checkbox';cb.value=v;
    cb.checked=selected?selected.has(v):true;
    const sp=document.createElement('span');
    sp.textContent=v||'（空白）';sp.title=v;
    item.appendChild(cb);item.appendChild(sp);
    container.appendChild(item);
  });
}
function selectAllVals(all){
  document.querySelectorAll('#cfpVals input[type=checkbox]').forEach(cb=>cb.checked=all);
}
function applyColFlt(){
  if(!cfpCol)return;
  const filters=cfpForSheet==='sr'?srColFilters:colFilters;
  const srcData=cfpForSheet==='sr'?SR_D:D;
  if(cfpTab==='list'){
    const sel=new Set();
    document.querySelectorAll('#cfpVals input[type=checkbox]').forEach(cb=>{if(cb.checked)sel.add(cb.value);});
    const allVals=[...new Set(srcData.map(r=>r.t[cfpCol]||''))];
    if(sel.size===allVals.length){delete filters[cfpCol];}
    else{filters[cfpCol]={type:'list',selected:sel};}
  } else {
    const op1=document.getElementById('cfpOp1').value;
    const val1=document.getElementById('cfpVal1').value.trim();
    const op2=document.getElementById('cfpOp2').value;
    const val2=document.getElementById('cfpVal2').value.trim();
    if(!op1||(op1!=='blank'&&op1!=='notblank'&&!val1)){delete filters[cfpCol];}
    else{filters[cfpCol]={type:'text',logic:cfpLogic,op1,val1,op2,val2};}
  }
  updateColFltUI();
  closeCfp();
  if(cfpForSheet==='sr'){srApplyF();}else{applyF();}
}
function resetColFlt(){
  if(cfpCol){
    const filters=cfpForSheet==='sr'?srColFilters:colFilters;
    delete filters[cfpCol];
    updateColFltUI();
    closeCfp();
    if(cfpForSheet==='sr'){srApplyF();}else{applyF();}
  }
}
function updateColFltUI(){
  // 統合データ列ハイライト
  TC.forEach((c,i)=>{
    const th=document.querySelector('#mth-'+i);
    if(th){th.classList.toggle('col-filtered',!!colFilters[c]);const fb=th.querySelector('.flt-btn');if(fb)fb.classList.toggle('active',!!colFilters[c]);}
  });
  const hasMain=Object.keys(colFilters).length>0;
  document.getElementById('clrColFlt').classList.toggle('vis',hasMain);
  // SR列ハイライト
  SR_TC.forEach((c,i)=>{
    const th=document.querySelector('#srth-'+i);
    if(th){th.classList.toggle('col-filtered',!!srColFilters[c]);const fb=th.querySelector('.flt-btn');if(fb)fb.classList.toggle('active',!!srColFilters[c]);}
  });
  const hasSR=Object.keys(srColFilters).length>0;
  document.getElementById('clrSRColFlt').classList.toggle('vis',hasSR);
}
function matchOp(op,cellVal,query){
  const c=cellVal.toLowerCase(),q=query.toLowerCase();
  switch(op){
    case 'contains':return c.includes(q);
    case 'notcontains':return!c.includes(q);
    case 'equals':return c===q;
    case 'notequals':return c!==q;
    case 'startswith':return c.startsWith(q);
    case 'endswith':return c.endsWith(q);
    case 'blank':return cellVal.trim()==='';
    case 'notblank':return cellVal.trim()!=='';
    default:return true;
  }
}
function matchColFilter(cf,cellVal){
  if(!cf)return true;
  if(cf.type==='list')return cf.selected.has(cellVal);
  const v=cellVal||'';
  const r1=(cf.op1==='blank'||cf.op1==='notblank')?matchOp(cf.op1,v,''):matchOp(cf.op1,v,cf.val1);
  if(!cf.op2)return r1;
  const r2=(cf.op2==='blank'||cf.op2==='notblank')?matchOp(cf.op2,v,''):matchOp(cf.op2,v,cf.val2);
  return cf.logic==='AND'?r1&&r2:r1||r2;
}

// ========== 統合データ フィルター・レンダリング ==========
function applyF(){
  const q=document.getElementById('srch').value.toLowerCase().trim();
  const kb=document.getElementById('kFlt').value;
  const st=document.getElementById('sFlt').value;
  fil=D.filter(r=>{
    if(q&&!r.s.includes(q))return false;
    if(kb&&r.t[KC]!==kb)return false;
    if(st&&r.t[SC]!==st)return false;
    for(const[col,cf]of Object.entries(colFilters)){if(!matchColFilter(cf,r.t[col]||''))return false;}
    return true;
  });
  if(sc)fil.sort((a,b)=>{const va=a.t[sc]||'',vb=b.t[sc]||'';return sa?va.localeCompare(vb,'ja'):vb.localeCompare(va,'ja');});
  pg=1;render();
}
function bdg(v){
  if(!v)return'';
  if(v.includes('販売中'))return`<span class="badge bon">${v}</span>`;
  if(v.includes('休止'))return`<span class="badge boff">${v}</span>`;
  if(v.includes('撤回')||v.includes('終了'))return`<span class="badge bcancel">${v}</span>`;
  return`<span class="badge boff">${v}</span>`;
}
function render(){
  const tot=fil.length,tp=Math.max(1,Math.ceil(tot/pp));
  if(pg>tp)pg=tp;
  const s=(pg-1)*pp,e=Math.min(s+pp,tot);
  document.getElementById('cnt').innerHTML=`表示: <strong>${s+1}–${e}</strong> / 全 <strong>${tot.toLocaleString()}</strong> 件`;
  const tb=document.getElementById('tB');
  if(!tot){tb.innerHTML='<tr><td colspan="99" class="empty"><div class="ei">🔍</div>条件に一致するデータがありません</td></tr>';renderP('pag',tp,pg,pp,n=>{pg=n;render()},v=>{pp=v;pg=1;render()});return;}
  const si=TC.indexOf(SC),ni=TC.indexOf('届出番号'),di=TC.indexOf('届出日');
  tb.innerHTML=fil.slice(s,e).map((r,ri)=>{
    const tds=TC.map((col,ci)=>{
      const v=r.t[col]||'';
      if(ci===si)return`<td>${bdg(v)}</td>`;
      if(col==='届出番号')return`<td class="tn">${v}</td>`;
      if(col==='届出日'||col==='撤回日'||col==='変更日')return`<td class="td">${v}</td>`;
      return`<td><span class="tc" title="${v.replace(/"/g,'&quot;')}">${v}</span></td>`;
    }).join('');
    return`<tr data-i="${s+ri}">${tds}</tr>`;
  }).join('');
  tb.querySelectorAll('tr[data-i]').forEach(tr=>tr.onclick=()=>openM(+tr.dataset.i));
  renderP('pag',tp,pg,pp,n=>{pg=n;render()},v=>{pp=v;pg=1;render()});
}

// ========== SR情報 フィルター・レンダリング ==========
function srApplyF(){
  const q=document.getElementById('srSrch').value.toLowerCase().trim();
  srFil=SR_D.filter(r=>{
    if(q&&!r.s.includes(q))return false;
    for(const[col,cf]of Object.entries(srColFilters)){if(!matchColFilter(cf,r.t[col]||''))return false;}
    return true;
  });
  if(srSc)srFil.sort((a,b)=>{const va=a.t[srSc]||'',vb=b.t[srSc]||'';return srSa?va.localeCompare(vb,'ja'):vb.localeCompare(va,'ja');});
  srPg=1;srRender();
}
function srRender(){
  const tot=srFil.length,tp=Math.max(1,Math.ceil(tot/srPp));
  if(srPg>tp)srPg=tp;
  const s=(srPg-1)*srPp,e=Math.min(s+srPp,tot);
  document.getElementById('srCnt').innerHTML=`表示: <strong>${s+1}–${e}</strong> / 全 <strong>${tot.toLocaleString()}</strong> 件`;
  const tb=document.getElementById('srTB');
  if(!tot){tb.innerHTML='<tr><td colspan="99" class="empty"><div class="ei">🔍</div>条件に一致するデータがありません</td></tr>';renderP('srPag',tp,srPg,srPp,n=>{srPg=n;srRender()},v=>{srPp=v;srPg=1;srRender()});return;}
  tb.innerHTML=srFil.slice(s,e).map(r=>{
    const tds=SR_TC.map(col=>{
      const v=r.t[col]||'';
      if(col==='届出番号')return`<td class="tn">${v}</td>`;
      if(/^https?:\/\//.test(v))return`<td><a href="${v}" target="_blank" rel="noopener" style="color:var(--pri)">${v}</a></td>`;
      return`<td><span class="tc" title="${v.replace(/"/g,'&quot;')}">${v}</span></td>`;
    }).join('');
    return`<tr>${tds}</tr>`;
  }).join('');
  renderP('srPag',tp,srPg,srPp,n=>{srPg=n;srRender()},v=>{srPp=v;srPg=1;srRender()});
}

// ========== ページング（共通） ==========
function renderP(pagId,tp,curPg,curPp,onPage,onPpChange){
  const pag=document.getElementById(pagId);
  const mk=(l,p,d,a)=>{const b=document.createElement('button');b.className='pb'+(a?' act':'');b.textContent=l;b.disabled=d;if(!d&&!a)b.onclick=()=>onPage(p);return b;};
  const btns=document.createElement('div');btns.className='pbtns';
  btns.appendChild(mk('«',1,curPg===1,false));btns.appendChild(mk('‹',curPg-1,curPg===1,false));
  let ps=[];
  if(tp<=7){for(let i=1;i<=tp;i++)ps.push(i);}
  else{ps=[1];let a=Math.max(2,curPg-2),b=Math.min(tp-1,curPg+2);if(a>2)ps.push('…');for(let i=a;i<=b;i++)ps.push(i);if(b<tp-1)ps.push('…');ps.push(tp);}
  ps.forEach(p=>{if(p==='…'){const sp=document.createElement('span');sp.textContent='…';sp.style.cssText='padding:4px 3px;color:var(--muted)';btns.appendChild(sp);}else btns.appendChild(mk(p,p,false,p===curPg));});
  btns.appendChild(mk('›',curPg+1,curPg===tp,false));btns.appendChild(mk('»',tp,curPg===tp,false));
  const pw=document.createElement('div');pw.className='ppw';pw.innerHTML='表示件数:';
  const sl=document.createElement('select');sl.className='pps';
  [25,50,100,200].forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n+'件';if(n===curPp)o.selected=true;sl.appendChild(o);});
  sl.onchange=()=>onPpChange(+sl.value);
  pw.appendChild(sl);
  pag.innerHTML='';pag.appendChild(btns);pag.appendChild(pw);
}

  {t:'点検・変更履歴',k:['変更履歴（2025年3月31日以前）','変更履歴（2025年4月1日以降）','前回の自己点検報告月']}
];
function buildSRSection(srRows){
  if(!srRows||srRows.length===0)return null;
  const sec=document.createElement('div');sec.className='msec';
  sec.innerHTML='<div class="mst">SR情報抽出</div>';
  const allKeys=[];const keySet=new Set();
  srRows.forEach(row=>{Object.keys(row).forEach(k=>{if(!keySet.has(k)){keySet.add(k);allKeys.push(k);}});});
  const countEl=document.createElement('div');countEl.className='sr-count';
  countEl.textContent=`${srRows.length}件のSR情報`;
  sec.appendChild(countEl);
  const wrapper=document.createElement('div');wrapper.style.overflowX='auto';
  const tbl=document.createElement('table');tbl.className='sr-table';
  const thead=document.createElement('thead');const headerRow=document.createElement('tr');
  const numTh=document.createElement('th');numTh.textContent='#';numTh.style.width='30px';
  headerRow.appendChild(numTh);
  allKeys.forEach(k=>{const th=document.createElement('th');th.textContent=k;headerRow.appendChild(th);});
  thead.appendChild(headerRow);tbl.appendChild(thead);
  const tbody=document.createElement('tbody');
  srRows.forEach((row,idx)=>{
    const tr=document.createElement('tr');
    const numTd=document.createElement('td');numTd.textContent=idx+1;
    numTd.style.cssText='text-align:center;color:var(--muted);font-weight:600;white-space:nowrap';
    tr.appendChild(numTd);
    allKeys.forEach(k=>{
      const td=document.createElement('td');const v=row[k]||'';
      if(/^https?:\/\//.test(v)){td.innerHTML=`<a href="${v}" target="_blank" rel="noopener">${v}</a>`;}
      else{td.textContent=v;}
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);wrapper.appendChild(tbl);sec.appendChild(wrapper);
  return sec;
}
function openM(idx){
  const r=fil[idx];if(!r)return;
  const d=r.d;
  document.getElementById('mT').textContent=d['商品名']||'（商品名なし）';
  document.getElementById('mS').textContent=[d['法人名'],d['届出番号']].filter(Boolean).join(' | ');
  const body=document.getElementById('mB');body.innerHTML='';
  const shown=new Set();
  SECS.forEach(g=>{
    const items=g.k.filter(k=>d[k]&&d[k].trim());if(!items.length)return;
    items.forEach(k=>shown.add(k));
    const sec=document.createElement('div');sec.className='msec';
    sec.innerHTML=`<div class="mst">${g.t}</div>`;
    const grid=document.createElement('div');grid.className='mg';
    items.forEach(k=>{let v=d[k];if(/^https?:\/\//.test(v))v=`<a href="${v}" target="_blank" rel="noopener">${v}</a>`;grid.innerHTML+=`<div class="mk">${k}</div><div class="mv">${v}</div>`;});
    sec.appendChild(grid);body.appendChild(sec);
  });
  const others=Object.entries(d).filter(([k,v])=>!shown.has(k)&&v&&v.trim());
  if(others.length){
    const sec=document.createElement('div');sec.className='msec';sec.innerHTML='<div class="mst">その他の届出情報</div>';
    const grid=document.createElement('div');grid.className='mg';
    others.forEach(([k,v])=>{if(/^https?:\/\//.test(v))v=`<a href="${v}" target="_blank" rel="noopener">${v}</a>`;grid.innerHTML+=`<div class="mk">${k}</div><div class="mv">${v}</div>`;});
    sec.appendChild(grid);body.appendChild(sec);
  }
  if(HAS_SR&&r.sr&&r.sr.length>0){
    const srSec=buildSRSection(r.sr);if(srSec)body.appendChild(srSec);
  }
  document.getElementById('ov').classList.add('act');body.scrollTop=0;
}
function closeM(){document.getElementById('ov').classList.remove('act');}
document.getElementById('mC').onclick=closeM;
document.getElementById('mCB').onclick=closeM;
document.getElementById('ov').onclick=e=>{if(e.target===e.currentTarget)closeM();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeM();closeCfp();}});
document.addEventListener('mousedown',e=>{
  const pop=document.getElementById('colFltPop');
  if(pop.classList.contains('open')&&!pop.contains(e.target)&&!e.target.classList.contains('flt-btn'))closeCfp();
});

document.getElementById('clrSRColFlt').onclick=()=>{Object.keys(srColFilters).forEach(k=>delete srColFilters[k]);updateColFltUI();srApplyF();};

document.getElementById('srch').addEventListener('input',()=>{clearTimeout(st);st=setTimeout(applyF,200);});
document.getElementById('kFlt').onchange=applyF;
document.getElementById('sFlt').onchange=applyF;

document.getElementById('srSrch').addEventListener('input',()=>{clearTimeout(srSt);srSt=setTimeout(srApplyF,200);});

buildH();
applyF();
if(HAS_SR&&SR_D.length>0){
  document.getElementById('tabSR').style.display='';
  buildSRH();
  srApplyF();
}
